<!DOCTYPE html>
<html>
<head>
    <title>Music Bot Log</title>
    <style>
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden;
        }
        body { 
            font-family: monospace; 
            background-color: #1e1e1e; 
            color: #dcdcdc; 
            display: flex; 
            flex-direction: column; 
        }
        pre { 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            flex-grow: 1;
            overflow-y: auto;
            margin: 0;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div style="background-color: #333; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #555;">
        <h3 style="margin: 0; font-family: sans-serif;">Music Bot Logs</h3>
        <form method="POST" action="/shutdown" onsubmit="return confirm('Are you sure you want to shut down the bot?');" style="margin: 0;">
            <button type="submit" style="background-color: #d9534f; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px; font-weight: bold; font-family: sans-serif;">
                Shutdown Bot
            </button>
        </form>
    </div>
    <pre id="log-content">{log_content}</pre>
    <script>
        var logContent = document.getElementById("log-content");
        logContent.scrollTop = logContent.scrollHeight;

        setInterval(function() {
            var isAtBottom = Math.ceil(logContent.scrollTop + logContent.clientHeight) >= logContent.scrollHeight - 10;
            
            if (!isAtBottom) {
                return;
            }

            fetch(window.location.href)
                .then(function(response) { return response.text(); })
                .then(function(html) {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, "text/html");
                    var newPre = doc.getElementById("log-content");
                    
                    if (newPre && newPre.innerHTML !== logContent.innerHTML) {
                        logContent.innerHTML = newPre.innerHTML;
                        logContent.scrollTop = logContent.scrollHeight;
                    }
                })
                .catch(function(err) { console.error("Error fetching logs:", err); });
        }, 5000);
    </script>
</body>
</html>
